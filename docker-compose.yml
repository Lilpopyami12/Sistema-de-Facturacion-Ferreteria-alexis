services:
  postgres:
    image: postgres:16
    container_name: ${POSTGRES_CONTAINER_NAME:-ferreteria_alexis_postgres}
    restart: unless-stopped
    environment:
      POSTGRES_DB: ferreteria_alexis
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "${POSTGRES_HOST_PORT:-55432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ferreteria_alexis"]
      interval: 5s
      timeout: 5s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: ${PGADMIN_CONTAINER_NAME:-ferreteria_alexis_pgadmin}
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@ferreteriaalexis.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "${PGADMIN_HOST_PORT:-5050}:80"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  postgres_data:
  pgadmin_data:
